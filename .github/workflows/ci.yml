name: Skill checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile scripts/prepare_source.py scripts/validate_outputs.py

      - name: Test Markdown source preparation
        run: |
          python scripts/prepare_source.py tests/fixtures/sample_model.md --output-dir tests/tmp/source
          test -f tests/tmp/source/source.json
          test -f tests/tmp/source/source_numbered.txt
          grep -q "MD-L00001" tests/tmp/source/source_numbered.txt
